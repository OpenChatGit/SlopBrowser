<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Downloads</title>
    <style>
      :root {
        --fg: #ffffff;
        --muted: #8b90a3;
        --accent: #6c8cff;
        --border: #333;
        --bg: #0e0f13;
        --surface: rgba(18, 18, 18, 0.88);
        --row-hover: rgba(255, 255, 255, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.14) transparent;
      }
      *::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
      }
      #page {
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }
      #searchForm {
        margin-bottom: 12px;
      }
      .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 18px;
        backdrop-filter: blur(8px);
      }
      .search-box:focus-within {
        border-color: #555;
      }
      .search-box .glass {
        color: var(--muted);
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }
      #q {
        flex: 1;
        min-width: 0;
        border: none;
        background: transparent;
        color: var(--fg);
        font: inherit;
        font-size: 14px;
        padding: 10px 0;
        outline: none;
      }
      #q::placeholder {
        color: var(--muted);
      }

      /* Toolbar */
      .dl-toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-height: 36px;
        margin-bottom: 12px;
      }
      .dl-toolbar[hidden] {
        display: none !important;
      }
      .dl-toolbar-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--fg);
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }
      .dl-toolbar-btn svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }
      .dl-toolbar-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .dl-toolbar-btn.danger:hover {
        background: rgba(255, 107, 107, 0.12);
        border-color: rgba(255, 107, 107, 0.45);
        color: #ff9a9a;
      }

      #card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        backdrop-filter: blur(8px);
        max-height: calc(100vh - 132px);
        overflow-y: auto;
      }
      #card,
      #card * {
        -webkit-user-select: none;
        user-select: none;
      }
      .day-block + .day-block {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .day-head {
        padding: 16px 20px 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
      }
      .day-list {
        padding: 0 8px 8px;
      }
      .dl-row {
        display: grid;
        grid-template-columns: 22px 52px 28px minmax(0, 1fr) auto 32px;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 10px;
        color: inherit;
        cursor: pointer;
        transition: background 0.12s ease;
      }
      .dl-row:hover {
        background: var(--row-hover);
      }
      .dl-row.selected {
        background: rgba(108, 140, 255, 0.1);
      }
      .dl-row.selected:hover {
        background: rgba(108, 140, 255, 0.14);
      }
      .dl-check-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .dl-check-input {
        position: absolute;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }
      .dl-check-box {
        width: 16px;
        height: 16px;
        border: 1.5px solid #5c6370;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
        box-sizing: border-box;
      }
      .dl-check-box::after {
        content: "";
        width: 4px;
        height: 8px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg) translateY(-1px);
        opacity: 0;
        transition: opacity 0.12s ease;
      }
      .dl-row:hover .dl-check-box {
        border-color: #8b90a3;
      }
      .dl-check-input:checked + .dl-check-box {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: 0 0 0 2px rgba(108, 140, 255, 0.2);
      }
      .dl-check-input:checked + .dl-check-box::after {
        opacity: 1;
      }
      .dl-check-input:focus-visible + .dl-check-box {
        outline: 2px solid rgba(108, 140, 255, 0.45);
        outline-offset: 2px;
      }
      .dl-row img {
        -webkit-user-drag: none;
        user-drag: none;
      }
      .time-cell {
        font-size: 12px;
        color: var(--muted);
        text-align: right;
        padding-right: 4px;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .dl-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        color: var(--accent);
      }
      .dl-icon img,
      .dl-icon svg {
        width: 18px;
        height: 18px;
        display: block;
      }
      .dl-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .dl-name {
        font-size: 13.5px;
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .dl-track {
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
        max-width: 280px;
      }
      .dl-bar {
        height: 100%;
        background: var(--accent);
        width: 0;
        transition: width 0.2s ease;
      }
      .dl-bar.done {
        background: #3ecf8e;
      }
      .dl-bar.error {
        background: #e05c5c;
      }
      .dl-meta {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        text-align: right;
        padding-right: 4px;
      }
      .dl-menu {
        border: none;
        background: transparent;
        color: var(--muted);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .dl-menu:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--fg);
      }
      #ctxMenu {
        position: fixed;
        z-index: 50;
        min-width: 180px;
        padding: 4px;
        border-radius: 10px;
        background: #1c1c20;
        border: 1px solid var(--border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        display: none;
      }
      #ctxMenu.open {
        display: block;
      }
      .ctx-item {
        display: block;
        width: 100%;
        border: none;
        background: transparent;
        color: var(--fg);
        font: inherit;
        font-size: 13px;
        text-align: left;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      .ctx-item:hover {
        background: var(--row-hover);
      }
      .ctx-item:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .ctx-item.danger {
        color: #ff6b6b;
      }
      .empty {
        padding: 48px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      .empty-filter {
        display: none;
        padding: 32px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }
      .empty-filter.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="page">
      <form id="searchForm">
        <div class="search-box">
          <i class="glass" data-lucide="search"></i>
          <input
            id="q"
            type="search"
            spellcheck="false"
            autocomplete="off"
            placeholder="Search downloads"
          />
        </div>
      </form>

      <div id="dlToolbar" class="dl-toolbar" hidden>
        <button type="button" id="deleteBtn" class="dl-toolbar-btn danger">
          <i data-lucide="trash-2"></i>
          <span id="deleteBtnLabel">Delete all</span>
        </button>
      </div>

      <div id="card">
        <div id="content"></div>
        <p id="emptyAll" class="empty" hidden>No downloads yet.</p>
        <p id="emptyFilter" class="empty-filter">No results for your search.</p>
      </div>
    </div>

    <div id="ctxMenu" role="menu">
      <button type="button" class="ctx-item" data-action="open">Open file</button>
      <button type="button" class="ctx-item" data-action="show">Show in folder</button>
      <button type="button" class="ctx-item" data-action="copy">Copy file path</button>
      <button type="button" class="ctx-item" data-action="cancel">Cancel download</button>
      <button type="button" class="ctx-item danger" data-action="remove">
        Remove from list
      </button>
    </div>

    <script src="lib/lucide.js"></script>
    <script>
      try {
        window.lucide.createIcons();
      } catch (e) {}

      let allEntries = [];
      let ctxTarget = null;
      const selectedIds = new Set();
      let lastSelectedId = null;

      function entryKey(entry) {
        return String(entry.id);
      }

      function keyFromRow(row) {
        return row.dataset.id;
      }

      function getVisibleEntries() {
        return filterEntries(document.getElementById("q").value);
      }

      function getVisibleEntryKeys() {
        return getVisibleEntries().map(entryKey);
      }

      function applySelectionToDom() {
        document.querySelectorAll(".dl-row").forEach((row) => {
          const key = keyFromRow(row);
          const sel = selectedIds.has(key);
          row.classList.toggle("selected", sel);
          const input = row.querySelector(".dl-check-input");
          if (input) input.checked = sel;
        });
        updateToolbar();
      }

      function selectRange(fromKey, toKey) {
        const keys = getVisibleEntryKeys();
        const a = keys.indexOf(fromKey);
        const b = keys.indexOf(toKey);
        if (a === -1 || b === -1) return;
        const lo = Math.min(a, b);
        const hi = Math.max(a, b);
        for (let i = lo; i <= hi; i++) selectedIds.add(keys[i]);
      }

      function updateToolbar() {
        const bar = document.getElementById("dlToolbar");
        const label = document.getElementById("deleteBtnLabel");
        const count = selectedIds.size;
        bar.hidden = !allEntries.length;
        label.textContent =
          count > 0 ? "Delete selected (" + count + ")" : "Delete all";
      }

      function downloadsApi() {
        return window.slopApp?.downloads || null;
      }

      function downloadBridge() {
        return window.slopDownloadsBridge || null;
      }

      function formatBytes(bytes) {
        const n = Number(bytes);
        if (!Number.isFinite(n) || n < 0) return "—";
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(1) + " MB";
        return (n / (1024 * 1024 * 1024)).toFixed(2) + " GB";
      }

      function formatByteRange(received, total) {
        if (total > 0) return formatBytes(received) + " / " + formatBytes(total);
        if (received > 0) return formatBytes(received);
        return "—";
      }

      function progressPct(entry) {
        if (!entry) return 0;
        if (entry.state === "completed") return 100;
        if (entry.state === "cancelled" || entry.state === "interrupted") return 0;
        if (entry.totalBytes > 0) {
          return Math.min(
            100,
            Math.round((entry.receivedBytes / entry.totalBytes) * 100)
          );
        }
        return entry.receivedBytes > 0 ? -1 : 0;
      }

      function stateLabel(entry) {
        if (entry.state === "completed") return "Completed";
        if (entry.state === "cancelled") return "Cancelled";
        if (entry.state === "interrupted") return "Failed";
        const pct = progressPct(entry);
        if (pct < 0) return "Downloading…";
        return pct + "%";
      }

      function formatTime(ts) {
        const d = new Date(ts || Date.now());
        return d.toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function dayKey(ts) {
        const d = new Date(ts || Date.now());
        return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
      }

      function formatDayHeader(ts) {
        const d = new Date(ts || Date.now());
        const now = new Date();
        const todayKey = dayKey(now.getTime());
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const key = dayKey(d.getTime());
        const dateStr = d.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric",
        });
        if (key === todayKey) return "Today – " + dateStr;
        if (key === dayKey(yesterday.getTime())) return "Yesterday – " + dateStr;
        return dateStr;
      }

      function groupByDay(entries) {
        const map = new Map();
        for (const e of entries) {
          const k = dayKey(e.startedAt);
          if (!map.has(k)) map.set(k, []);
          map.get(k).push(e);
        }
        return [...map.entries()].sort((a, b) => {
          const ta = a[1][0]?.startedAt || 0;
          const tb = b[1][0]?.startedAt || 0;
          return tb - ta;
        });
      }

      function filterEntries(query) {
        const q = query.trim().toLowerCase();
        if (!q) return allEntries;
        return allEntries.filter((e) => {
          const hay = (e.filename || "") + " " + (e.url || "") + " " + (e.savePath || "");
          return hay.toLowerCase().includes(q);
        });
      }

      function faviconCandidates(entry) {
        const out = [];
        const push = (url) => {
          if (url && !out.includes(url)) out.push(url);
        };
        push(entry.favicon);
        const ref = entry.sourceUrl || entry.url || "";
        try {
          const u = new URL(ref);
          if (u.protocol === "http:" || u.protocol === "https:") {
            push(
              "https://www.google.com/s2/favicons?domain=" +
                encodeURIComponent(u.hostname) +
                "&sz=64"
            );
            push(u.origin + "/favicon.ico");
          }
        } catch (_) {}
        return out;
      }

      function globeSvg() {
        return (
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>'
        );
      }

      function downloadIconSvg() {
        return (
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>'
        );
      }

      function buildIcon(entry) {
        const wrap = document.createElement("span");
        wrap.className = "dl-icon";
        const candidates = faviconCandidates(entry);
        if (!candidates.length) {
          wrap.innerHTML = globeSvg();
          return wrap;
        }
        const img = document.createElement("img");
        img.alt = "";
        img.referrerPolicy = "no-referrer";
        let idx = 0;
        img.onerror = () => {
          idx += 1;
          if (idx < candidates.length) {
            img.src = candidates[idx];
            return;
          }
          wrap.innerHTML = globeSvg();
        };
        img.src = candidates[0];
        wrap.appendChild(img);
        return wrap;
      }

      async function reloadFromStore() {
        const api = downloadsApi();
        if (api?.getAll) {
          try {
            const entries = await api.getAll();
            window.renderSlopDownloads(entries);
            return;
          } catch (_) {}
        }
        const bridge = downloadBridge();
        if (bridge?.send) {
          bridge.send("refresh");
          return;
        }
        renderList(filterEntries(document.getElementById("q").value));
      }

      async function persistRemoveEntry(entry) {
        const api = downloadsApi();
        if (api?.remove) {
          await api.remove(entry.id).catch(() => {});
          return "direct";
        }
        const bridge = downloadBridge();
        if (bridge?.send) {
          bridge.send("remove", { id: entry.id });
          return "bridge";
        }
        return null;
      }

      async function deleteFromToolbar() {
        const api = downloadsApi();
        const bridge = downloadBridge();
        if (!api && !bridge) return;

        let mode = "direct";
        if (selectedIds.size === 0) {
          if (api?.clear) await api.clear().catch(() => {});
          else if (bridge?.send) {
            bridge.send("clear");
            mode = "bridge";
          }
        } else {
          const ids = [...selectedIds];
          if (api?.removeMany) await api.removeMany(ids).catch(() => {});
          else if (bridge?.send) {
            bridge.send("removeMany", { ids });
            mode = "bridge";
          }
        }
        selectedIds.clear();
        lastSelectedId = null;
        if (mode === "direct") await reloadFromStore();
      }

      function buildRow(entry) {
        const row = document.createElement("div");
        row.className = "dl-row";
        row.dataset.id = entry.id;
        const key = entryKey(entry);
        if (selectedIds.has(key)) row.classList.add("selected");

        const checkWrap = document.createElement("label");
        checkWrap.className = "dl-check-wrap";
        checkWrap.addEventListener("click", (e) => e.stopPropagation());

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "dl-check-input";
        check.checked = selectedIds.has(key);
        check.addEventListener("click", (e) => {
          if (e.shiftKey && lastSelectedId != null) {
            e.preventDefault();
            selectRange(lastSelectedId, key);
            applySelectionToDom();
            return;
          }
          lastSelectedId = key;
        });
        check.addEventListener("change", () => {
          if (check.checked) selectedIds.add(key);
          else selectedIds.delete(key);
          row.classList.toggle("selected", check.checked);
          updateToolbar();
        });

        const checkBox = document.createElement("span");
        checkBox.className = "dl-check-box";
        checkWrap.appendChild(check);
        checkWrap.appendChild(checkBox);

        const time = document.createElement("span");
        time.className = "time-cell";
        time.textContent = formatTime(entry.startedAt);

        const icon = buildIcon(entry);

        const main = document.createElement("div");
        main.className = "dl-main";
        const name = document.createElement("span");
        name.className = "dl-name";
        name.title = entry.filename || "";
        name.textContent = entry.filename || "Download";

        const track = document.createElement("div");
        track.className = "dl-track";
        const bar = document.createElement("div");
        bar.className = "dl-bar";
        const pct = progressPct(entry);
        if (entry.state === "completed") bar.classList.add("done");
        else if (entry.state === "cancelled" || entry.state === "interrupted") {
          bar.classList.add("error");
        }
        if (entry.state === "progressing") {
          bar.style.width = pct < 0 ? "35%" : Math.max(pct, 2) + "%";
          track.appendChild(bar);
          main.appendChild(name);
          main.appendChild(track);
        } else {
          main.appendChild(name);
        }

        const meta = document.createElement("span");
        meta.className = "dl-meta";
        meta.textContent =
          stateLabel(entry) + " · " + formatByteRange(entry.receivedBytes, entry.totalBytes);

        const menuBtn = document.createElement("button");
        menuBtn.type = "button";
        menuBtn.className = "dl-menu";
        menuBtn.setAttribute("aria-label", "More actions");
        menuBtn.innerHTML = '<i data-lucide="ellipsis-vertical"></i>';
        menuBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          openCtxMenu(menuBtn, entry);
        });

        row.addEventListener("click", (e) => {
          if (e.target.closest(".dl-check-wrap, .dl-menu")) return;
          if (entry.state === "completed") openEntry(entry);
        });

        row.appendChild(checkWrap);
        row.appendChild(time);
        row.appendChild(icon);
        row.appendChild(main);
        row.appendChild(meta);
        row.appendChild(menuBtn);
        return row;
      }

      function renderList(entries) {
        const content = document.getElementById("content");
        const emptyAll = document.getElementById("emptyAll");
        const emptyFilter = document.getElementById("emptyFilter");

        content.replaceChildren();
        emptyAll.hidden = true;
        emptyFilter.classList.remove("visible");

        if (!allEntries.length) {
          emptyAll.hidden = false;
          updateToolbar();
          return;
        }
        if (!entries.length) {
          emptyFilter.classList.add("visible");
          updateToolbar();
          return;
        }

        const days = groupByDay(entries);
        for (const [, dayEntries] of days) {
          const block = document.createElement("div");
          block.className = "day-block";
          const head = document.createElement("div");
          head.className = "day-head";
          head.textContent = formatDayHeader(dayEntries[0].startedAt);
          block.appendChild(head);

          const list = document.createElement("div");
          list.className = "day-list";
          for (const entry of dayEntries) {
            list.appendChild(buildRow(entry));
          }
          block.appendChild(list);
          content.appendChild(block);
        }

        try {
          window.lucide.createIcons({ attrs: { "stroke-width": 2 } });
        } catch (_) {}
        updateToolbar();
      }

      async function openEntry(entry) {
        const api = downloadsApi();
        if (api?.open) await api.open(entry.id).catch(() => {});
        else downloadBridge()?.send?.("open", { id: entry.id });
      }

      async function showEntry(entry) {
        const api = downloadsApi();
        if (api?.showInFolder) await api.showInFolder(entry.id).catch(() => {});
        else downloadBridge()?.send?.("showInFolder", { id: entry.id });
      }

      async function cancelEntry(entry) {
        const api = downloadsApi();
        if (api?.cancel) await api.cancel(entry.id).catch(() => {});
        else downloadBridge()?.send?.("cancel", { id: entry.id });
      }

      function openCtxMenu(anchor, entry) {
        ctxTarget = entry;
        const menu = document.getElementById("ctxMenu");
        menu.querySelector('[data-action="open"]').disabled = entry.state !== "completed";
        menu.querySelector('[data-action="show"]').disabled = !entry.savePath;
        menu.querySelector('[data-action="copy"]').disabled = !entry.savePath;
        menu.querySelector('[data-action="cancel"]').disabled = entry.state !== "progressing";
        const r = anchor.getBoundingClientRect();
        menu.style.left = Math.max(8, r.right - 180) + "px";
        menu.style.top = r.bottom + 4 + "px";
        menu.classList.add("open");
      }

      function closeCtxMenu() {
        document.getElementById("ctxMenu").classList.remove("open");
        ctxTarget = null;
      }

      document.getElementById("ctxMenu").addEventListener("click", (e) => {
        const btn = e.target.closest(".ctx-item");
        if (!btn || !ctxTarget || btn.disabled) return;
        const action = btn.dataset.action;
        const entry = ctxTarget;
        if (action === "open") openEntry(entry);
        else if (action === "show") showEntry(entry);
        else if (action === "copy") {
          navigator.clipboard?.writeText(entry.savePath || "").catch(() => {});
        }         else if (action === "cancel") cancelEntry(entry);
        else if (action === "remove") {
          persistRemoveEntry(entry).then((mode) => {
            selectedIds.delete(entryKey(entry));
            if (mode === "direct") reloadFromStore();
          });
        }
        closeCtxMenu();
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest("#ctxMenu") && !e.target.closest(".dl-menu")) {
          closeCtxMenu();
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeCtxMenu();
      });

      document.getElementById("deleteBtn").addEventListener("click", () => {
        deleteFromToolbar();
      });

      document.getElementById("q").addEventListener("input", () => {
        renderList(filterEntries(document.getElementById("q").value));
      });
      document.getElementById("searchForm").addEventListener("submit", (e) => {
        e.preventDefault();
      });

      window.renderSlopDownloads = function (entries, opts) {
        const preserveSelection = opts?.preserveSelection;
        allEntries = (entries || []).map((e) => ({
          id: String(e.id),
          filename: e.filename || "Download",
          url: e.url || "",
          savePath: e.savePath || "",
          sourceUrl: e.sourceUrl || "",
          favicon: e.favicon || "",
          receivedBytes: Number(e.receivedBytes) || 0,
          totalBytes: Number(e.totalBytes) || 0,
          state: e.state || "completed",
          startedAt: Number(e.startedAt) || Date.now(),
          endedAt: e.endedAt != null ? Number(e.endedAt) : null,
        }));
        if (!preserveSelection) {
          selectedIds.clear();
          lastSelectedId = null;
        } else {
          const valid = new Set(allEntries.map(entryKey));
          for (const id of selectedIds) {
            if (!valid.has(id)) selectedIds.delete(id);
          }
        }
        updateToolbar();
        renderList(filterEntries(document.getElementById("q").value));
      };

      if (window.slopApp?.onDownloadChanged) {
        window.slopApp.onDownloadChanged(() => reloadFromStore());
      }

      reloadFromStore();
    </script>
  </body>
</html>
