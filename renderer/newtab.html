<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Home</title>
    <style>
      :root {
        --fg: #ffffff;
        --muted: #8b90a3;
        --accent: #6c8cff;
        --border: #333;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Inter", "Segoe UI", -apple-system, system-ui, sans-serif;
        background: #000;
        color: var(--fg);
        user-select: none;
        overflow: hidden;
      }

      /* WebGL Dot Canvas */
      #bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      /* Vignette */
      #vignette {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: radial-gradient(
          circle at center,
          rgba(0, 0, 0, 0.75) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.85s ease;
      }
      body.chat-mode #vignette {
        opacity: 0;
      }

      #wrap {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        transition: justify-content 0.45s ease, padding 0.45s ease;
      }
      body.chat-started #wrap {
        justify-content: flex-end;
        align-items: center;
        padding: 16px 20px 22px;
      }
      #chatStage {
        width: min(680px, 92vw);
        max-width: 100%;
        max-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 0;
        margin: 0 auto;
        transition: width 0.35s ease, justify-content 0.45s ease, gap 0.35s ease;
      }
      body.chat-mode #chatStage {
        width: min(720px, 94vw);
      }
      body.chat-started #chatStage {
        flex: 1 1 auto;
        height: auto;
        min-height: 0;
        justify-content: flex-end;
        gap: 16px;
      }
      #chatThread {
        display: none;
        flex: 1 1 auto;
        min-height: 0;
        width: 100vw;
        max-width: none;
        margin-left: calc(50% - 50vw);
        overflow-x: hidden;
        overflow-y: auto;
        padding: 8px 0 4px;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
      }
      body.chat-started #chatThread {
        display: block;
      }
      #chatThreadInner {
        width: min(720px, 94vw);
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 0 2px;
        box-sizing: border-box;
      }
      .chat-msg {
        width: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0;
        animation: chat-msg-in 0.28s ease;
      }
      @keyframes chat-msg-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .chat-msg-bubble {
        width: fit-content;
        max-width: 100%;
        font-size: 15px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--fg);
        user-select: text;
      }
      .chat-msg.user .chat-msg-bubble {
        margin-left: auto;
        text-align: left;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 10px 14px;
        white-space: pre-wrap;
      }
      .chat-msg.assistant .chat-msg-bubble {
        margin-right: auto;
        color: #d7dbe8;
        white-space: normal;
      }
      .chat-msg.assistant .chat-msg-bubble > :first-child {
        margin-top: 0;
      }
      .chat-msg.assistant .chat-msg-bubble > :last-child {
        margin-bottom: 0;
      }
      .chat-msg.assistant .chat-msg-bubble p {
        margin: 0 0 0.75em;
      }
      .chat-msg.assistant .chat-msg-bubble p:last-child {
        margin-bottom: 0;
      }
      .chat-msg.assistant .chat-msg-bubble ul,
      .chat-msg.assistant .chat-msg-bubble ol {
        margin: 0 0 0.75em;
        padding-left: 1.35em;
      }
      .chat-msg.assistant .chat-msg-bubble li {
        margin: 0.2em 0;
      }
      .chat-msg.assistant .chat-msg-bubble strong {
        font-weight: 650;
        color: #eef0f7;
      }
      .chat-msg.assistant .chat-msg-bubble a {
        color: #9eb4ff;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .chat-msg.assistant .chat-msg-bubble code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9em;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 5px;
        padding: 0.1em 0.35em;
      }
      .chat-msg.assistant .chat-msg-bubble .md-code {
        margin: 0 0 0.85em;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: #121418;
        overflow: hidden;
      }
      .chat-msg.assistant .chat-msg-bubble .md-code-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 5px 8px 5px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }
      .chat-msg.assistant .chat-msg-bubble .md-code-lang {
        font-size: 11px;
        font-weight: 550;
        color: #8b90a3;
        text-transform: lowercase;
        letter-spacing: 0.02em;
      }
      .chat-msg.assistant .chat-msg-bubble .md-code-copy {
        border: none;
        background: transparent;
        color: #9aa0b4;
        font: inherit;
        font-size: 11px;
        font-weight: 550;
        padding: 3px 8px;
        border-radius: 6px;
        cursor: pointer;
        line-height: 1.2;
      }
      .chat-msg.assistant .chat-msg-bubble .md-code-copy:hover {
        color: #e6e8ef;
        background: rgba(255, 255, 255, 0.06);
      }
      .chat-msg.assistant .chat-msg-bubble pre {
        margin: 0;
        padding: 8px 10px;
        overflow-x: auto;
        background: transparent;
        border: none;
        border-radius: 0;
      }
      .chat-msg.assistant .chat-msg-bubble pre code,
      .chat-msg.assistant .chat-msg-bubble pre code.hljs {
        display: block;
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 12.5px;
        line-height: 1.45;
        color: #d7dbe7;
        white-space: pre;
        overflow-wrap: normal;
        word-break: normal;
      }
      /* Compact dark syntax tokens */
      .chat-msg.assistant .chat-msg-bubble .hljs-comment,
      .chat-msg.assistant .chat-msg-bubble .hljs-quote {
        color: #6f7688;
        font-style: italic;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-keyword,
      .chat-msg.assistant .chat-msg-bubble .hljs-selector-tag,
      .chat-msg.assistant .chat-msg-bubble .hljs-subst {
        color: #ff7b72;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-string,
      .chat-msg.assistant .chat-msg-bubble .hljs-doctag,
      .chat-msg.assistant .chat-msg-bubble .hljs-regexp {
        color: #a5d6ff;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-number,
      .chat-msg.assistant .chat-msg-bubble .hljs-literal,
      .chat-msg.assistant .chat-msg-bubble .hljs-variable,
      .chat-msg.assistant .chat-msg-bubble .hljs-template-variable {
        color: #79c0ff;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-title,
      .chat-msg.assistant .chat-msg-bubble .hljs-section,
      .chat-msg.assistant .chat-msg-bubble .hljs-selector-id {
        color: #d2a8ff;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-type,
      .chat-msg.assistant .chat-msg-bubble .hljs-class .hljs-title,
      .chat-msg.assistant .chat-msg-bubble .hljs-built_in {
        color: #ffa657;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-attr,
      .chat-msg.assistant .chat-msg-bubble .hljs-attribute {
        color: #79c0ff;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-symbol,
      .chat-msg.assistant .chat-msg-bubble .hljs-bullet,
      .chat-msg.assistant .chat-msg-bubble .hljs-link {
        color: #ffa198;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-meta {
        color: #8b90a3;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-emphasis {
        font-style: italic;
      }
      .chat-msg.assistant .chat-msg-bubble .hljs-strong {
        font-weight: 650;
      }
      .chat-msg.assistant .chat-msg-bubble blockquote {
        margin: 0 0 0.75em;
        padding: 0.15em 0 0.15em 0.85em;
        border-left: 2px solid rgba(255, 255, 255, 0.18);
        color: #aeb4c7;
      }
      .chat-msg.assistant .chat-msg-bubble h1,
      .chat-msg.assistant .chat-msg-bubble h2,
      .chat-msg.assistant .chat-msg-bubble h3,
      .chat-msg.assistant .chat-msg-bubble h4 {
        margin: 0.9em 0 0.45em;
        font-weight: 650;
        line-height: 1.3;
        color: #eef0f7;
      }
      .chat-msg.assistant .chat-msg-bubble h1 { font-size: 1.25em; }
      .chat-msg.assistant .chat-msg-bubble h2 { font-size: 1.12em; }
      .chat-msg.assistant .chat-msg-bubble h3 { font-size: 1.05em; }
      .chat-msg.assistant .chat-msg-bubble hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        margin: 1em 0;
      }
      .chat-msg.assistant .chat-msg-bubble table {
        border-collapse: collapse;
        margin: 0 0 0.85em;
        width: 100%;
        font-size: 0.92em;
      }
      .chat-msg.assistant .chat-msg-bubble th,
      .chat-msg.assistant .chat-msg-bubble td {
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 6px 8px;
        text-align: left;
      }
      .chat-msg.assistant {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .chat-msg-reasoning {
        display: none;
        width: min(100%, 720px);
      }
      .chat-msg-reasoning.visible {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
      .chat-msg-reasoning-toggle {
        border: none;
        background: transparent;
        color: #8b90a3;
        padding: 0;
        margin: 0;
        font: inherit;
        font-size: 12.5px;
        font-weight: 500;
        line-height: 1.3;
        cursor: pointer;
        text-align: left;
      }
      .chat-msg-reasoning-toggle:hover {
        color: #c4cadb;
      }
      .chat-msg-reasoning-toggle:disabled,
      .chat-msg-reasoning-toggle:disabled:hover {
        cursor: default;
        color: #8b90a3;
      }
      .chat-msg-reasoning.open .chat-msg-reasoning-toggle:not(:disabled) {
        color: #aeb4c7;
      }
      .chat-msg-reasoning-body {
        display: none;
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        margin: 0;
        color: #8b90a3;
        font-size: 12.5px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: min(240px, 32vh);
        overflow: auto;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
      }
      .chat-msg-reasoning.open .chat-msg-reasoning-body {
        display: block;
      }
      .chat-msg.assistant.streaming.reasoning-active:not(.has-content)
        .chat-msg-reasoning.open
        .chat-msg-reasoning-body::after,
      .chat-msg.assistant.streaming.has-content .chat-msg-bubble::after {
        content: "";
        display: inline-block;
        width: 0.5ch;
        margin-left: 1px;
        animation: chat-caret 0.9s steps(1) infinite;
        opacity: 0.7;
      }
      @keyframes chat-caret {
        50% {
          opacity: 0;
        }
      }
      .chat-msg.error .chat-msg-bubble {
        color: #ff8e8e;
        white-space: pre-wrap;
      }
      #searchForm {
        width: 100%;
        flex: 0 0 auto;
        transition: transform 0.45s ease;
      }
      .search-box {
        position: relative;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        background: rgba(18, 18, 18, 0.72);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 4px 8px 4px 20px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s,
          border-radius 0.35s ease,
          padding 0.35s ease,
          gap 0.35s ease;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        overflow: visible;
      }
      body.chat-mode .search-box {
        flex-direction: column;
        align-items: stretch;
        border-radius: 18px;
        padding: 12px 12px 8px;
        gap: 6px;
      }
      .search-box::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 0;
        pointer-events: none;
      }
      .search-box > * {
        position: relative;
        z-index: 1;
      }
      .search-box:focus-within {
        border-color: var(--border);
      }
      .composer-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        min-width: 0;
        width: 100%;
      }
      body:not(.chat-mode) .composer-row {
        align-items: center;
      }
      .search-box .glass {
        color: var(--muted);
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        margin-top: 0;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      body.chat-mode .search-box .glass {
        display: none;
      }
      .search-field {
        position: relative;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: stretch;
        min-height: 48px;
        isolation: isolate;
        transition: min-height 0.35s ease;
      }
      body.chat-mode .search-field {
        min-height: 52px;
        align-items: flex-start;
      }
      #qGhost {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        pointer-events: none;
        color: var(--muted);
        font-size: 17px;
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: normal;
        white-space: nowrap;
        overflow: visible;
        z-index: 0;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.12s ease, visibility 0.12s ease;
      }
      body.chat-mode #qGhost {
        align-items: flex-start;
        justify-content: flex-start;
        padding: 0;
        white-space: normal;
      }
      #qGhost.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .q-ghost-ch {
        display: inline-block;
      }
      .q-ghost-ch.space {
        width: 0.28em;
      }
      .q-ghost-ch.scramble {
        color: #5c6378;
        opacity: 0.82;
      }
      .q-ghost-ch.resolved {
        color: var(--muted);
        opacity: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        #qGhost {
          transition: none;
        }
      }
      #q {
        position: relative;
        z-index: 1;
        flex: 1;
        min-width: 0;
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--fg);
        font: inherit;
        font-size: 17px;
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: normal;
        padding: 14px 0;
        margin: 0;
        resize: none;
        overflow: hidden;
        min-height: 48px;
        max-height: 180px;
        field-sizing: content;
        user-select: text;
        caret-color: var(--fg);
        color-scheme: dark;
      }
      body.chat-mode #q {
        align-self: flex-start;
        width: 100%;
        min-height: 24px;
        height: 24px;
        padding: 0;
        line-height: 1.4;
        box-sizing: border-box;
      }
      .search-field.has-ghost #q {
        color: transparent;
        caret-color: transparent;
      }
      /* Autofocus keeps the field focused; still show decode ghost + caret. */
      .search-field.has-ghost #q:focus {
        caret-color: var(--fg);
      }
      #go {
        border: none;
        background: #2a2a2e;
        color: #8b90a3;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, opacity 0.2s, transform 0.2s;
      }
      body.chat-mode #go {
        display: none;
      }
      #go svg {
        width: 20px;
        height: 20px;
      }
      /* Active (text entered): white with a black arrow */
      .search-box.has-text #go {
        background: #ffffff;
        color: #000000;
      }
      .search-box.has-text #go:hover {
        filter: brightness(0.92);
      }

      .composer-bar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        padding-top: 0;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.28s ease 0.05s, transform 0.28s ease 0.05s;
      }
      body.chat-mode .composer-bar {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }
      .composer-bar-left,
      .composer-bar-right {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .composer-bar-right {
        flex: 1 1 auto;
        justify-content: flex-end;
      }
      .composer-tool {
        border: none;
        background: transparent;
        color: var(--muted);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .composer-tool:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--fg);
      }
      .composer-tool svg {
        width: 16px;
        height: 16px;
      }
      .composer-model-pick {
        position: relative;
        flex: 0 1 auto;
        min-width: 0;
        max-width: min(240px, 46vw);
      }
      .composer-model-trigger {
        border: none;
        background: transparent;
        color: var(--muted);
        height: 32px;
        max-width: 100%;
        padding: 0 6px 0 8px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font: inherit;
        font-size: 12.5px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .composer-model-trigger:hover,
      .composer-model-trigger[aria-expanded="true"] {
        background: rgba(255, 255, 255, 0.06);
        color: var(--fg);
      }
      .composer-model-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .composer-model-trigger svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        opacity: 0.75;
      }
      .composer-model-menu {
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        width: min(280px, 76vw);
        max-height: min(320px, 48vh);
        display: flex;
        flex-direction: column;
        background: #1a1a1e;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
        padding: 0;
        z-index: 20;
        overflow: hidden;
      }
      .composer-model-menu.hidden {
        display: none;
      }
      .composer-model-search {
        width: 100%;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: transparent;
        color: var(--fg);
        font: inherit;
        font-size: 12.5px;
        padding: 8px 10px;
        outline: none;
      }
      .composer-model-search::placeholder {
        color: #6b7080;
      }
      .composer-model-toggles {
        display: none;
        flex-direction: column;
        gap: 1px;
        padding: 4px 5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .composer-model-toggles.visible {
        display: flex;
      }
      .composer-model-menu.auto-active .composer-model-toggles {
        border-bottom: none;
        padding: 6px 10px 8px;
      }
      .composer-model-menu.auto-active .composer-model-list {
        display: none;
      }
      .composer-model-toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 28px;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .composer-model-toggle-row.hidden {
        display: none;
      }
      .composer-model-auto-block {
        display: none;
        flex-direction: column;
        gap: 3px;
        padding: 0;
      }
      .composer-model-menu.auto-active .composer-model-auto-block {
        display: flex;
      }
      .composer-model-auto-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 22px;
      }
      .composer-model-auto-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--fg);
        line-height: 1.2;
      }
      .composer-model-auto-desc {
        font-size: 11.5px;

    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <footer class="home-footer">
      <span id="homeBuild" class="home-build"></span>
      <span class="home-footer-sep home-build-sep" aria-hidden="true">·</span>
      <span id="homeVersion">v0.1.4</span>
      <span class="home-footer-sep" aria-hidden="true">·</span>
      <a
        id="homeGithub"
        class="home-github"
        href="https://github.com/Nicol/SlopBrowser"
        target="_blank"
        rel="noopener noreferrer"
        >GitHub</a
      >
    </footer>

    <script type="module">
      import { renderMarkdown, enhanceMarkdown } from "./js/markdown.js";
      window.__slopMarkdown = { renderMarkdown, enhanceMarkdown };
    </script>
    <script src="lib/lucide.js"></script>
    <script src="lib/three.min.js"></script>
    <script>
      try {
        window.lucide.createIcons();
      } catch (e) {}

      /* ---------- WebGL dot background ---------- */
      (function initBackground() {
        const THREE = window.THREE;
        if (!THREE) return;
        const canvas = document.getElementById("bg");
        const MAX_OCCLUDE = 8;
        const OCCLUDE_GAP_PX = 1.5;

        const renderer = new THREE.WebGLRenderer({
          canvas,
          alpha: true,
          antialias: false,
        });

        function layoutBg(uniforms) {
          const dpr = Math.min(window.devicePixelRatio || 1, 1.25);
          renderer.setPixelRatio(dpr);
          renderer.setSize(window.innerWidth, window.innerHeight, false);
          uniforms.u_resolution.value.set(
            renderer.domElement.width,
            renderer.domElement.height
          );
          return dpr;
        }

        const occludeRects = Array.from(
          { length: MAX_OCCLUDE },
          () => new THREE.Vector4()
        );
        const occludeRadii = new Float32Array(MAX_OCCLUDE);

        function parseRadiusLength(raw, refSize) {
          if (!raw || raw === "0" || raw === "0px") return 0;
          const token = String(raw).trim().split(/\s+/)[0];
          if (token.endsWith("%")) return (parseFloat(token) * 0.01) * refSize;
          return parseFloat(token) || 0;
        }

        function elementCornerRadius(el, w, h) {
          const s = getComputedStyle(el);
          const ref = Math.min(w, h);
          const radii = [
            parseRadiusLength(s.borderTopLeftRadius, ref),
            parseRadiusLength(s.borderTopRightRadius, ref),
            parseRadiusLength(s.borderBottomRightRadius, ref),
            parseRadiusLength(s.borderBottomLeftRadius, ref),
          ];
          return Math.min(
            ...radii.map((rad) => Math.min(rad, w * 0.5, h * 0.5))
          );
        }

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const uniforms = {
          u_time: { value: 0 },
          u_anim_time: { value: 0 },
          u_resolution: {
            value: new THREE.Vector2(1, 1),
          },
          u_opacities: {
            value: [0.3, 0.3, 0.3, 0.5, 0.5, 0.5, 0.8, 0.8, 0.8, 1.0],
          },
          u_colors: {
            value: [
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
            ],
          },
          u_total_size: { value: 10.0 },
          u_dot_size: { value: 2.5 },
          u_mouse: { value: new THREE.Vector2(-9999, -9999) },
          u_mouse_radius: { value: 60.0 },
          u_mouse_strength: { value: 0 },
          u_occlude_count: { value: 0 },
          u_occlude_rects: { value: occludeRects },
          u_occlude_radius: { value: occludeRadii },
          u_occlude_margin: { value: OCCLUDE_GAP_PX },
        };

        function textOccludeBounds(el) {
          const range = document.createRange();
          range.selectNodeContents(el);
          const rects = range.getClientRects();
          if (!rects.length) return null;

          let top = Infinity;
          let bottom = -Infinity;
          let left = Infinity;
          let right = -Infinity;

          for (const rect of rects) {
            if (rect.width <= 0 || rect.height <= 0) continue;
            top = Math.min(top, rect.top);
            bottom = Math.max(bottom, rect.bottom);
            left = Math.min(left, rect.left);
            right = Math.max(right, rect.right);
          }

          if (!isFinite(top)) return null;
          return {
            top,
            left,
            bottom,
            right,
            width: right - left,
            height: bottom - top,
          };
        }

        function syncOccluders() {
          const res = uniforms.u_resolution.value;
          const scaleX = res.x / window.innerWidth;
          const scaleY = res.y / window.innerHeight;
          const scale = (scaleX + scaleY) * 0.5;
          uniforms.u_occlude_margin.value = OCCLUDE_GAP_PX * scale;
          let count = 0;

          for (const el of document.querySelectorAll(".bg-occlude")) {
            if (count >= MAX_OCCLUDE) break;
            const r =
              (el.classList.contains("bg-occlude-text") &&
                textOccludeBounds(el)) ||
              el.getBoundingClientRect();
            if (r.width <= 0 || r.height <= 0) continue;

            const cx = (r.left + r.width * 0.5) * scaleX;
            let cy = (r.top + r.height * 0.5) * scaleY;
            const halfW = r.width * 0.5 * scaleX;
            const halfH = r.height * 0.5 * scaleY;
            if (el.classList.contains("bg-occlude-text")) {
              cy += 3 * scaleY;
            }
            const scaleAvg = (scaleX + scaleY) * 0.5;
            const radius =
              elementCornerRadius(el, r.width, r.height) * scaleAvg;

            occludeRects[count].set(cx, cy, halfW, halfH);
            occludeRadii[count] = radius;
            count++;
          }

          uniforms.u_occlude_count.value = count;
        }

        let bgDpr = layoutBg(uniforms);
        syncOccluders();

        const material = new THREE.ShaderMaterial({
          vertexShader: `
            precision mediump float;
            uniform vec2 u_resolution;
            out vec2 fragCoord;
            void main() {
              gl_Position = vec4(position, 1.0);
              fragCoord = (position.xy + 1.0) * 0.5 * u_resolution;
              fragCoord.y = u_resolution.y - fragCoord.y;
            }
          `,
          fragmentShader: `
            precision mediump float;
            in vec2 fragCoord;

            uniform float u_time;
            uniform float u_anim_time;
            uniform float u_opacities[10];
            uniform vec3 u_colors[6];
            uniform float u_total_size;
            uniform float u_dot_size;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse;
            uniform float u_mouse_radius;
            uniform float u_mouse_strength;
            uniform int u_occlude_count;
            uniform vec4 u_occlude_rects[${MAX_OCCLUDE}];
            uniform float u_occlude_radius[${MAX_OCCLUDE}];
            uniform float u_occlude_margin;

            out vec4 fragColor;

            float PHI = 1.61803398874989484820459;
            float random(vec2 xy) {
                return fract(tan(distance(xy * PHI, xy) * 0.5) * xy.x);
            }

            float roundedBoxSDF(vec2 p, vec2 center, vec2 halfSize, float radius) {
              vec2 local = abs(p - center) - halfSize + radius;
              return length(max(local, 0.0)) + min(max(local.x, local.y), 0.0) - radius;
            }

            bool occluded(vec2 p) {
              float dotReach = u_dot_size * 0.5 + u_occlude_margin;
              for (int i = 0; i < ${MAX_OCCLUDE}; i++) {
                if (i >= u_occlude_count) break;
                vec4 shape = u_occlude_rects[i];
                float dist = roundedBoxSDF(p, shape.xy, shape.zw, u_occlude_radius[i]);
                if (dist <= dotReach) return true;
              }
              return false;
            }

            void main() {
                vec2 grid_offset = vec2(
                    abs(floor((mod(u_resolution.x, u_total_size) - u_dot_size) * 0.5)),
                    abs(floor((mod(u_resolution.y, u_total_size) - u_dot_size) * 0.5))
                );

                vec2 st = fragCoord.xy;
                st.x -= grid_offset.x;
                st.y -= grid_offset.y;

                float opacity = step(0.0, st.x) * step(0.0, st.y);

                vec2 st2 = vec2(int(st.x / u_total_size), int(st.y / u_total_size));

                vec2 cell_center = (st2 + 0.5) * u_total_size + grid_offset;

                if (occluded(cell_center)) {
                  fragColor = vec4(0.0);
                  return;
                }

                float mouse_dist = distance(cell_center, u_mouse);
                float mouse_near = 1.0 - smoothstep(u_mouse_radius * 0.2, u_mouse_radius, mouse_dist);
                float mouse_boost = mouse_near * u_mouse_strength;
                float local_dot = min(u_dot_size + mouse_boost * 2.0, u_total_size * 0.72);
                float dot_frac = local_dot / u_total_size;

                float frequency = 5.0;
                float show_offset = random(st2);
                float rand = random(st2 * floor((u_time / frequency) + show_offset + frequency));
                opacity *= u_opacities[int(rand * 10.0)];
                opacity *= 1.0 - step(dot_frac, fract(st.x / u_total_size));
                opacity *= 1.0 - step(dot_frac, fract(st.y / u_total_size));

                vec3 color = u_colors[int(show_offset * 6.0)];

                vec2 center_grid = u_resolution / 2.0 / u_total_size;
                float dist_from_center = distance(center_grid, st2);
                float timing_offset_intro = dist_from_center * 0.006 + (random(st2) * 0.1);

                float current_timing_offset = timing_offset_intro;
                opacity *= step(current_timing_offset, u_anim_time);
                opacity *= clamp((1.0 - step(current_timing_offset + 0.1, u_anim_time)) * 1.25, 1.0, 1.25);

                fragColor = vec4(color, opacity);
                fragColor.rgb *= fragColor.a;
            }
          `,
          uniforms: uniforms,
          glslVersion: THREE.GLSL3,
          blending: THREE.CustomBlending,
          blendSrc: THREE.SrcAlphaFactor,
          blendDst: THREE.OneFactor,
          transparent: true,
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const startTime = performance.now();
        let mouseTarget = 0;
        let mouseDirty = false;
        let pendingMouseX = -9999;
        let pendingMouseY = -9999;
        let animating = true;
        let lastFrameTime = performance.now();
        let chatModeActive = false;

        function computeIntroMax() {
          const cellW = window.innerWidth / uniforms.u_total_size.value;
          const cellH = window.innerHeight / uniforms.u_total_size.value;
          const maxDist = Math.hypot(cellW * 0.5, cellH * 0.5);
          return maxDist * 0.006 + 0.15;
        }

        let introMax = computeIntroMax();
        let animTime = 0;
        let animTarget = introMax;
        const INTRO_SECONDS = 0.85;

        function setAnimTarget(next, opts = {}) {
          introMax = computeIntroMax();
          animTarget = next ? 0 : introMax;
          if (opts.instant) animTime = animTarget;
        }

        window.__slopSetChatMode = (active, opts = {}) => {
          chatModeActive = !!active;
          document.body.classList.toggle("chat-mode", chatModeActive);
          setAnimTarget(chatModeActive, opts);
          if (typeof window.__slopOnChatModeChange === "function") {
            window.__slopOnChatModeChange(chatModeActive);
          }
        };

        window.__slopRestoreChat = (state = {}) => {
          const active = !!state.active;
          const messages = Array.isArray(state.messages) ? state.messages : [];
          window.__slopSetChatMode(active, {
            instant: !!state.instant,
          });
          if (typeof window.__slopApplyChatHistory === "function") {
            window.__slopApplyChatHistory(messages, {
              started: active && messages.length > 0,
            });
          }
        };

        function setMouseFromEvent(e) {
          pendingMouseX = e.clientX;
          pendingMouseY = e.clientY;
          mouseDirty = true;
          mouseTarget = 1;
        }

        document.addEventListener("mousemove", setMouseFromEvent);
        document.addEventListener("mouseenter", setMouseFromEvent);
        document.addEventListener("mouseleave", () => {
          mouseTarget = 0;
        });

        document.addEventListener("visibilitychange", () => {
          animating = !document.hidden;
          lastFrameTime = performance.now();
        });

        if (typeof ResizeObserver !== "undefined") {
          const occludeObserver = new ResizeObserver(() => syncOccluders());
          occludeObserver.observe(document.body);
          for (const el of document.querySelectorAll(".bg-occlude")) {
            occludeObserver.observe(el);
          }
        }

        (function animate() {
          requestAnimationFrame(animate);
          if (!animating) return;
          const now = performance.now();
          const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
          lastFrameTime = now;

          introMax = computeIntroMax();
          if (!chatModeActive && animTarget > introMax) animTarget = introMax;

          const speed = introMax / INTRO_SECONDS;
          if (animTime < animTarget) {
            animTime = Math.min(animTarget, animTime + speed * dt);
          } else if (animTime > animTarget) {
            animTime = Math.max(animTarget, animTime - speed * dt);
          }

          syncOccluders();
          if (mouseDirty) {
            mouseDirty = false;
            const res = uniforms.u_resolution.value;
            const scaleX = res.x / window.innerWidth;
            const scaleY = res.y / window.innerHeight;
            uniforms.u_mouse.value.set(
              pendingMouseX * scaleX,
              pendingMouseY * scaleY
            );
          }
          uniforms.u_time.value = (now - startTime) / 1000.0;
          uniforms.u_anim_time.value = animTime;
          const strength = uniforms.u_mouse_strength.value;
          uniforms.u_mouse_strength.value =
            strength + (mouseTarget - strength) * 0.12;
          renderer.render(scene, camera);
        })();

        let resizeTimer = null;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            bgDpr = layoutBg(uniforms);
            syncOccluders();
            introMax = computeIntroMax();
            if (!chatModeActive) animTarget = introMax;
          }, 120);
        });

        window.__syncBgOccluders = syncOccluders;
      })();

      /* ---------- Search / Composer ---------- */
      const q = document.getElementById("q");
      const qGhost = document.getElementById("qGhost");
      const searchField = document.querySelector(".search-field");
      const form = document.getElementById("searchForm");
      const searchBox = document.querySelector(".search-box");
      const composerBar = document.getElementById("composerBar");
      const chatThread = document.getElementById("chatThread");
      const chatThreadInner =
        document.getElementById("chatThreadInner") || chatThread;

      const Q_GHOST_PHRASES_SEARCH = [
        "Search a website",

      function shortModelLabel(id, name) {
        if (id === OPENROUTER_AUTO.free.id || openRouterAuto === "free") {
          return OPENROUTER_AUTO.free.label;

        if (id === OPENROUTER_AUTO.auto.id || openRouterAuto === "auto") {
          return OPENROUTER_AUTO.auto.label;
        }
        const label = String(name || id || "").trim();
        if (!label) return "Select model";
        if (name && name !== id) return name;
        const parts = label.split("/");
        return parts[parts.length - 1] || label;

      function syncComposerAutoSwitches() {
        const isOr = composerProvider === "openrouter";

        const meta =
          openRouterAuto === "free"
            ? OPENROUTER_AUTO.free
            : openRouterAuto === "auto"
              ? OPENROUTER_AUTO.auto
              : null;

        composerModelToggles?.classList.toggle("visible", isOr);
        composerModelMenu?.classList.toggle("auto-active", autoOn);

      function renderComposerModelList() {
        if (!composerModelList) return;
        composerModelList.innerHTML = "";

        const q = modelSearchQuery.trim().toLowerCase();
        const filtered = composerModels.filter((model) => {
          if (!q) return true;
          const hay = `${model.id} ${model.name || ""}`.toLowerCase();
          return hay.includes(q);
        });

        if (!filtered.length) {
          const empty = document.createElement("div");
          empty.className = "composer-model-empty";
          empty.textContent = composerModels.length
            ? "No models match your search."
            : selectedModelId
              ? "Could not load model list."
              : "Configure a provider in Settings.";
          composerModelList.appendChild(empty);
          return;

        for (const model of filtered) {
          const btn = document.createElement("button");
          btn.type = "button";
          const active = model.id === selectedModelId;
          btn.className = "composer-model-option" + (active ? " active" : "");
          btn.setAttribute("role", "option");
          btn.setAttribute("aria-selected", active ? "true" : "false");
          btn.title = model.id;

          const main = document.createElement("span");
          main.className = "composer-model-option-main";
          const nameEl = document.createElement("span");
          nameEl.className = "composer-model-option-name";
          nameEl.textContent = shortModelLabel(model.id, model.name);
          main.appendChild(nameEl);
          if (model.tag) {
            const tag = document.createElement("span");
            tag.className = "composer-model-option-tag";

            main.appendChild(tag);

          btn.addEventListener("click", () => {
            selectComposerModel(model.id, model.name).catch(() => {});

          composerModelList.appendChild(btn);

      async function persistComposerSettings(patch) {
        const api = window.slopApp?.agentSettings;
        if (!api?.get || !api?.set) return;
        try {
          const cur = (await api.get()) || {};
          await api.set({ ...cur, ...patch });
        } catch (_) {}
      }

      async function selectComposerModel(id, name) {
        selectedModelId = String(id || "").trim();
        openRouterAuto = "";
        if (selectedModelId === OPENROUTER_AUTO.free.id) openRouterAuto = "free";
        else if (selectedModelId === OPENROUTER_AUTO.auto.id) openRouterAuto = "auto";
        setComposerModelLabel(selectedModelId, name);
        syncComposerAutoSwitches();
        renderComposerModelList();
        setModelMenuOpen(false);
        await persistComposerSettings({
          model: selectedModelId,
          openRouterAuto,
        });
      }

      async function setComposerOpenRouterAuto(mode) {
        if (composerProvider !== "openrouter") return;
        const next = openRouterAuto === mode ? "" : mode;
        openRouterAuto = next;
        if (next === "free") selectedModelId = OPENROUTER_AUTO.free.id;
        else if (next === "auto") selectedModelId = OPENROUTER_AUTO.auto.id;
        else if (
          !selectedModelId ||
          selectedModelId === OPENROUTER_AUTO.free.id ||
          selectedModelId === OPENROUTER_AUTO.auto.id
        ) {
          const first = composerModels.find(
            (m) =>
              m.id !== OPENROUTER_AUTO.free.id &&
              m.id !== OPENROUTER_AUTO.auto.id
          );
          selectedModelId = first?.id || "";
        }
        setComposerModelLabel(selectedModelId);
        syncComposerAutoSwitches();
        renderComposerModelList();
        await persistComposerSettings({
          model: selectedModelId,
          openRouterAuto: next,
        });
      }

      async function loadComposerModels() {
        const api = window.slopApp?.agentSettings;
        if (!api?.get) return;
        const seq = ++modelLoadSeq;
        let settings = {};
        try {
          settings = (await api.get()) || {};
        } catch (_) {
          settings = {};
        }
        if (seq !== modelLoadSeq) return;

        composerProvider = String(settings.provider || "");
        openRouterAuto =
          composerProvider === "openrouter"
            ? String(settings.openRouterAuto || "")
            : "";
        selectedModelId = String(settings.model || "").trim();
        if (!openRouterAuto) {
          if (selectedModelId === OPENROUTER_AUTO.free.id) openRouterAuto = "free";
          else if (selectedModelId === OPENROUTER_AUTO.auto.id) openRouterAuto = "auto";
        }
        if (openRouterAuto === "free") selectedModelId = OPENROUTER_AUTO.free.id;
        if (openRouterAuto === "auto") selectedModelId = OPENROUTER_AUTO.auto.id;

        setComposerModelLabel(selectedModelId, selectedModelId || "Select model");
        syncComposerAutoSwitches();

        if (!api.listModels) {
          renderComposerModelList();
          return;
        }

        let res = { ok: false, models: [] };
        try {
          res = await api.listModels();
        } catch (_) {
          res = { ok: false, models: [] };
        }
        if (seq !== modelLoadSeq) return;

        composerModels = Array.isArray(res?.models) ? res.models.slice() : [];
        if (composerProvider === "openrouter") {
          const autos = [
            { id: OPENROUTER_AUTO.free.id, name: OPENROUTER_AUTO.free.label, tag: "Free" },
            { id: OPENROUTER_AUTO.auto.id, name: OPENROUTER_AUTO.auto.label, tag: "Pro" },
          ];
          for (const auto of autos.reverse()) {
            if (!composerModels.some((m) => m.id === auto.id)) {
              composerModels.unshift(auto);
            }
          }
        }
        if (
          selectedModelId &&
          !composerModels.some((m) => m.id === selectedModelId)
        ) {
          composerModels.unshift({ id: selectedModelId, name: selectedModelId });
        }
        const match = composerModels.find((m) => m.id === selectedModelId);
        setComposerModelLabel(
          selectedModelId,
          match?.name || selectedModelId || "Select model"
        );
        renderComposerModelList();
      }

      /* Similar-width chars only — avoids layout jitter during decode. */
      const Q_GHOST_CHARS =
        "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";

      function qShowsGhost() {
        // Show decode ghost whenever empty — including while autofocused.
        return !q.value.trim();
      }

      function qGhostRandomChar() {
        return Q_GHOST_CHARS[(Math.random() * Q_GHOST_CHARS.length) | 0];
      }

      function qGhostRender(text, ratio) {
        if (!qGhost) return;
        const locked = Math.floor(text.length * ratio);
        let html = "";
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === " ") {
            // Non-breaking space in a span — plain spaces collapse between inline-block chars.
            html += '<span class="q-ghost-ch space">&nbsp;</span>';
            continue;
          }
          const resolved = i < locked;
          const display = resolved ? ch : qGhostRandomChar();
          const safe =
            display === "<"
              ? "&lt;"
              : display === ">"
                ? "&gt;"
                : display === "&"
                  ? "&amp;"
                  : display === '"'
                    ? "&quot;"
                    : display === "'"
                      ? "&#39;"
                      : display;
          html +=
            '<span class="q-ghost-ch ' +
            (resolved ? "resolved" : "scramble") +
            '">' +
            safe +
            "</span>";
        }
        qGhost.innerHTML = html;
      }

      function sizeQGhostMinWidth() {
        if (!qGhost) return;
        const phrases = Q_GHOST_PHRASES;
        const longest = phrases.reduce(
          (a, b) => (a.length >= b.length ? a : b),
          ""
        );
        const probe = document.createElement("span");
        probe.style.cssText =
          "position:absolute;visibility:hidden;white-space:nowrap;" +
          "font:400 17px/1.25 Inter,Segoe UI,-apple-system,system-ui,sans-serif";
        probe.textContent = longest;
        document.body.appendChild(probe);
        qGhost.style.minWidth = probe.offsetWidth + "px";
        document.body.removeChild(probe);
        if (window.__syncBgOccluders) window.__syncBgOccluders();
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function animateQGhost(phrase, from, to, durationMs) {
        return new Promise((resolve) => {
          const start = performance.now();
          const step = (now) => {
            if (!qGhostLoop.running || qGhostLoop.loopId !== qGhostLoop.activeLoopId) {
              resolve();
              return;
            }
            const t = Math.min(1, (now - start) / durationMs);
            const ratio = from + (to - from) * t;
            if (qShowsGhost()) qGhostRender(phrase, ratio);
            if (t < 1) requestAnimationFrame(step);
            else resolve();
          };
          requestAnimationFrame(step);
        });
      }

      const qGhostLoop = {
        phraseIdx: 0,
        running: false,
        loopId: 0,
        activeLoopId: 0,

        syncVisibility() {
          if (!qGhost) return;
          const show = qShowsGhost();
          qGhost.classList.toggle("hidden", !show);
          if (searchField) searchField.classList.toggle("has-ghost", show);
          if (show) this.ensureRunning();
          else this.stop();
        },

        ensureRunning() {
          if (this.running) return;
          this.running = true;
          this.loopId++;
          this.activeLoopId = this.loopId;
          this.runLoop(this.activeLoopId);
        },

        start() {
          this.ensureRunning();
        },

        stop() {
          this.running = false;
          this.loopId++;
        },

        async runLoop(id) {
          const reducedMotion = window.matchMedia(
            "(prefers-reduced-motion: reduce)"
          ).matches;
          const decodeMs = reducedMotion ? 420 : 820;
          const encodeMs = reducedMotion ? 240 : 420;
          const holdMs = reducedMotion ? 2200 : 3200;

          try {
            while (this.running && id === this.loopId) {
              const phrase = Q_GHOST_PHRASES[this.phraseIdx];

              await animateQGhost(phrase, 0, 1, decodeMs);
              if (!this.running || id !== this.loopId || !qShowsGhost()) break;

              await sleep(holdMs);
              if (!this.running || id !== this.loopId || !qShowsGhost()) break;

              await animateQGhost(phrase, 1, 0, encodeMs);
              if (!this.running || id !== this.loopId) break;

              this.phraseIdx = (this.phraseIdx + 1) % Q_GHOST_PHRASES.length;
            }
          } finally {
            if (id === this.loopId) {
              this.running = false;
              if (qShowsGhost()) this.ensureRunning();
            }
          }
        },
      };

      function autosizeComposer() {
        if (!q) return;
        q.style.height = "auto";
        const base = chatModeUi ? 24 : 48;
        const next = Math.min(180, Math.max(base, q.scrollHeight));
        q.style.height = next + "px";
        if (window.__syncBgOccluders) window.__syncBgOccluders();
      }

      function syncComposerUi(active) {
        chatModeUi = !!active;
        Q_GHOST_PHRASES = chatModeUi
          ? Q_GHOST_PHRASES_CHAT
          : Q_GHOST_PHRASES_SEARCH;
        if (composerBar) composerBar.setAttribute("aria-hidden", chatModeUi ? "false" : "true");
        q.enterKeyHint = chatModeUi ? "send" : "go";
        if (!active) {
          setModelMenuOpen(false);
          if (!chatMessages.length) {
            document.body.classList.remove("chat-started");
            chatFirstMessageSent = false;
          }
        } else {
          loadComposerModels().catch(() => {});
        }
        qGhostLoop.phraseIdx = 0;
        qGhostLoop.stop();
        sizeQGhostMinWidth();
        autosizeComposer();
        qGhostLoop.syncVisibility();
        try {
          window.lucide?.createIcons?.();
        } catch (_) {}
        if (window.__syncBgOccluders) window.__syncBgOccluders();
        requestAnimationFrame(() => focusHomeSearchInput());
      }

      window.__slopOnChatModeChange = syncComposerUi;

      function titleFromMessage(text) {
        const clean = String(text || "").replace(/\s+/g, " ").trim();
        if (!clean) return "Chat";
        return clean.length > 42 ? clean.slice(0, 42).trimEnd() + "…" : clean;
      }

      function notifyChatTitle(text) {
        const title = titleFromMessage(text);
        try {
          window.slopChatBridge?.send("set-title", { title });
        } catch (_) {}
      }

      function syncChatToHost() {
        try {
          window.slopChatBridge?.send("sync-messages", {
            messages: chatMessages.map((m) => ({
              role: m.role,
              text: m.text,
              ...(m.reasoning ? { reasoning: m.reasoning } : {}),
              ...(Number.isFinite(m.reasoningMs)
                ? { reasoningMs: m.reasoningMs }
                : {}),
            })),
          });
        } catch (_) {}
      }

      function clearChatThread() {
        if (chatThreadInner) chatThreadInner.innerHTML = "";
      }

      window.__slopApplyChatHistory = (messages, opts = {}) => {
        // Don't wipe an in-flight assistant "Working..." row.
        if (chatStreaming && !opts.force) return;
        chatMessages = Array.isArray(messages)
          ? messages
              .filter(
                (m) =>
                  m &&
                  (m.role === "user" || m.role === "assistant") &&
                  String(m.text || "").trim()
              )
              .map((m) => {
                const entry = {
                  role: m.role,
                  text: String(m.text),
                };
                if (m.reasoning) entry.reasoning = String(m.reasoning);
                const ms = Number(m.reasoningMs);
                if (Number.isFinite(ms) && ms >= 0) entry.reasoningMs = ms;
                return entry;
              })
          : [];
        clearChatThread();
        for (const m of chatMessages) {
          appendChatMessage(m.role, m.text, {
            reasoning: m.reasoning || "",
            reasoningMs: m.reasoningMs,
          });
        }
        chatFirstMessageSent = chatMessages.some((m) => m.role === "user");
        if (opts.started || chatMessages.length) {
          enterChatStarted();
        } else if (!chatModeUi) {
          document.body.classList.remove("chat-started");
        }
        scrollChatToBottom();
      };

      function enterChatStarted() {
        if (document.body.classList.contains("chat-started")) return;
        document.body.classList.add("chat-started");
        if (window.__syncBgOccluders) {
          requestAnimationFrame(() => window.__syncBgOccluders());
        }
      }

      function scrollChatToBottom() {
        if (!chatThread) return;
        chatThread.scrollTop = chatThread.scrollHeight;
      }

      function setMessageBubbleContent(bubble, text, { markdown = false } = {}) {
        if (!bubble) return;
        const raw = text || "";
        const md = window.__slopMarkdown;
        if (markdown && md?.renderMarkdown) {
          bubble.innerHTML = md.renderMarkdown(raw);
          md.enhanceMarkdown?.(bubble);
        } else {
          bubble.textContent = raw;
        }
      }

      function formatThoughtDuration(ms) {
        const sec = Math.max(0, Number(ms) || 0) / 1000;
        if (sec < 1) return "Thought for less than a second";
        if (sec < 10) {
          const tenths = Math.round(sec * 10) / 10;
          const label =
            Math.abs(tenths - Math.round(tenths)) < 0.05
              ? String(Math.round(tenths))
              : tenths.toFixed(1);
          return `Thought for ${label}s`;
        }
        return `Thought for ${Math.round(sec)}s`;
      }

      function setReasoningContent(shell, text, opts = {}) {
        if (!shell) return;
        const body = shell.querySelector(".chat-msg-reasoning-body");
        const toggle = shell.querySelector(".chat-msg-reasoning-toggle");
        const raw = String(text || "");
        const label = opts.label || "";
        const hasBody = !!raw.trim();
        const expandable = opts.expandable != null ? !!opts.expandable : hasBody;

        if (!label && !hasBody) {
          shell.classList.remove("visible", "open");
          if (body) body.textContent = "";
          if (toggle) {
            toggle.textContent = "";
            toggle.disabled = true;
          }
          return;
        }

        shell.classList.add("visible");
        if (typeof opts.open === "boolean") {
          shell.classList.toggle("open", opts.open && hasBody);
        } else if (!hasBody) {
          shell.classList.remove("open");
        }
        if (body) body.textContent = raw.replace(/^\s+/, "").replace(/\s+$/, "");
        if (toggle) {
          toggle.textContent = label || (hasBody ? "Thought" : "Working...");
          toggle.disabled = !expandable || !hasBody;
          toggle.setAttribute(
            "aria-expanded",
            shell.classList.contains("open") ? "true" : "false"
          );
        }
      }

      function appendChatMessage(role, text, opts = {}) {
        if (!chatThreadInner) return null;
        const row = document.createElement("div");
        row.className =
          "chat-msg " +
          role +
          (opts.streaming ? " streaming" : "") +
          (opts.error ? " error" : "");

        let reasoningShell = null;
        if (role === "assistant" && !opts.error) {
          reasoningShell = document.createElement("div");
          reasoningShell.className = "chat-msg-reasoning";
          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "chat-msg-reasoning-toggle";
          toggle.setAttribute("aria-expanded", "false");
          toggle.disabled = true;
          toggle.textContent = "";
          const body = document.createElement("div");
          body.className = "chat-msg-reasoning-body";
          toggle.addEventListener("click", () => {
            if (toggle.disabled) return;
            reasoningShell.classList.toggle("open");
            toggle.setAttribute(
              "aria-expanded",
              reasoningShell.classList.contains("open") ? "true" : "false"
            );
          });
          reasoningShell.appendChild(toggle);
          reasoningShell.appendChild(body);
          row.appendChild(reasoningShell);
          if (opts.streaming) {
            setReasoningContent(reasoningShell, "", {
              label: "Working...",
              open: false,
              expandable: false,
            });
          } else if (opts.reasoning) {
            const ms = Number(opts.reasoningMs);
            setReasoningContent(reasoningShell, opts.reasoning, {
              label: Number.isFinite(ms)
                ? formatThoughtDuration(ms)
                : "Thought",
              open: false,
              expandable: true,
            });
            row.classList.add("reasoning-active");
          }
        }

        const bubble = document.createElement("div");
        bubble.className = "chat-msg-bubble";
        const useMarkdown = role === "assistant" && !opts.error;
        setMessageBubbleContent(bubble, text || "", { markdown: useMarkdown });
        if (text) row.classList.add("has-content");

        row.appendChild(bubble);
        chatThreadInner.appendChild(row);
        scrollChatToBottom();
        return { row, bubble, reasoningShell };
      }

      function setComposerBusy(busy) {
        chatStreaming = !!busy;
        if (q) q.disabled = !!busy;
        const send = document.getElementById("composerSend");
        if (send) send.disabled = !!busy;
        form?.classList.toggle("is-streaming", !!busy);
      }

      async function streamAssistantReply(pending = null) {
        const api = window.slopApp?.slopAi;
        if (!api?.stream) {
          if (pending?.row) {
            pending.row.classList.remove("streaming");
            pending.row.classList.add("error");
            setReasoningContent(pending.reasoningShell, "", {
              label: "",
              open: false,
              expandable: false,
            });
            setMessageBubbleContent(
              pending.bubble,
              "Chat is not available in this session.",
              { markdown: false }
            );
          } else {
            appendChatMessage(
              "assistant",
              "Chat is not available in this session.",
              { error: true }
            );
          }
          setComposerBusy(false);
          return;
        }

        const created =
          pending?.row && pending?.bubble
            ? pending
            : appendChatMessage("assistant", "", { streaming: true });
        const { row, bubble, reasoningShell } = created;
        setReasoningContent(reasoningShell, "", {
          label: "Working...",
          open: false,
          expandable: false,
        });
        scrollChatToBottom();

        let assembled = "";
        let reasoningAssembled = "";
        let reasoningStartedAt = 0;
        let reasoningEndedAt = 0;
        let thoughtFinished = false;
        setComposerBusy(true);

        const finishThoughtLabel = () => {
          if (thoughtFinished || !reasoningAssembled.trim()) return;
          thoughtFinished = true;
          if (!reasoningEndedAt) reasoningEndedAt = Date.now();
          const ms = Math.max(
            0,
            reasoningEndedAt - (reasoningStartedAt || reasoningEndedAt)
          );
          row.dataset.reasoningMs = String(ms);
          row.classList.add("reasoning-active");
          setReasoningContent(reasoningShell, reasoningAssembled, {
            label: formatThoughtDuration(ms),
            open: false,
            expandable: true,
          });
        };

        const payloadMessages = [
          CHAT_SYSTEM,
          ...chatMessages.map((m) => ({ role: m.role, content: m.text })),
        ];

        try {
          await api.stream(
            { messages: payloadMessages },
            {
              onChunk: (delta, meta = {}) => {
                const kind =
                  meta?.kind === "reasoning" ? "reasoning" : "content";
                if (kind === "reasoning") {
                  if (!reasoningStartedAt) reasoningStartedAt = Date.now();
                  reasoningAssembled += delta;
                  row.classList.add("reasoning-active");
                  setReasoningContent(reasoningShell, reasoningAssembled, {
                    label: "Thinking...",
                    open: true,
                    expandable: true,
                  });
                } else {
                  if (reasoningAssembled.trim() && !thoughtFinished) {
                    reasoningEndedAt = Date.now();
                    finishThoughtLabel();
                  } else if (!reasoningAssembled.trim()) {
                    setReasoningContent(reasoningShell, "", {
                      label: "",
                      open: false,
                      expandable: false,
                    });
                  }
                  assembled += delta;
                  row.classList.add("has-content");
                  setMessageBubbleContent(bubble, assembled, {
                    markdown: true,
                  });
                }
                scrollChatToBottom();
              },
              onDone: (text, meta = {}) => {
                assembled = text || assembled;
                if (meta?.reasoning) reasoningAssembled = meta.reasoning;
                setMessageBubbleContent(bubble, assembled, { markdown: true });
                if (reasoningAssembled.trim()) {
                  if (!reasoningEndedAt) reasoningEndedAt = Date.now();
                  finishThoughtLabel();
                } else {
                  setReasoningContent(reasoningShell, "", {
                    label: "",
                    open: false,
                    expandable: false,
                  });
                }
                row.classList.remove("streaming");
                row.classList.toggle("has-content", !!assembled.trim());
                const reasoningMs = Number(row.dataset.reasoningMs);
                chatMessages.push({
                  role: "assistant",
                  text: assembled,
                  ...(reasoningAssembled.trim()
                    ? {
                        reasoning: reasoningAssembled,
                        ...(Number.isFinite(reasoningMs)
                          ? { reasoningMs }
                          : {}),
                      }
                    : {}),
                });
                syncChatToHost();
                setComposerBusy(false);
                focusHomeSearchInput();
              },
              onError: (error) => {
                row.classList.remove("streaming");
                row.classList.add("error");
                if (reasoningAssembled.trim()) {
                  if (!reasoningEndedAt) reasoningEndedAt = Date.now();
                  finishThoughtLabel();
                } else {
                  setReasoningContent(reasoningShell, "", {
                    label: "",
                    open: false,
                    expandable: false,
                  });
                }
                setMessageBubbleContent(bubble, error || "Request failed", {
                  markdown: false,
                });
                setComposerBusy(false);
                focusHomeSearchInput();
              },
            }
          );
        } catch (err) {
          row.classList.remove("streaming");
          row.classList.add("error");
          setReasoningContent(reasoningShell, "", {
            label: "",
            open: false,
            expandable: false,
          });
          setMessageBubbleContent(bubble, err?.message || "Request failed", {
            markdown: false,
          });
          setComposerBusy(false);
          focusHomeSearchInput();
        }
      }

      function submitChatMessage() {
        if (chatStreaming) return;
        const text = q.value.trim();
        if (!text) return;

        if (!chatFirstMessageSent) {
          chatFirstMessageSent = true;
          notifyChatTitle(text);
        }

        enterChatStarted();
        chatMessages.push({ role: "user", text });
        appendChatMessage("user", text);

        // Show Working... immediately — before any IPC/sync delay.
        setComposerBusy(true);
        const pending = appendChatMessage("assistant", "", { streaming: true });
        setReasoningContent(pending.reasoningShell, "", {
          label: "Working...",
          open: false,
          expandable: false,
        });
        scrollChatToBottom();

        syncChatToHost();

        q.value = "";
        searchBox.classList.remove("has-text");
        autosizeComposer();
        qGhostLoop.syncVisibility();

        streamAssistantReply(pending);
      }

      q.addEventListener("input", () => {
        searchBox.classList.toggle("has-text", q.value.trim().length > 0);
        autosizeComposer();
        qGhostLoop.syncVisibility();
      });
      q.addEventListener("focus", () => qGhostLoop.syncVisibility());
      q.addEventListener("blur", () => qGhostLoop.syncVisibility());
      q.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (chatModeUi) {
          if (e.shiftKey) return; // newline
          e.preventDefault();
          submitChatMessage();
          return;
        }
        if (!e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      function focusHomeSearchInput() {
        if (!q) return;
        requestAnimationFrame(() => {
          if (document.activeElement !== q) {
            try {
              q.focus({ preventScroll: true });
            } catch (_) {
              q.focus();
            }
          }
          qGhostLoop.syncVisibility();
        });
      }

      window.__slopFocusHomeSearch = focusHomeSearchInput;
      window.addEventListener("focus", focusHomeSearchInput);
      window.addEventListener("pageshow", focusHomeSearchInput);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) focusHomeSearchInput();
      });

      function toURL(input) {
        const raw = input.trim();
        if (!raw) return null;
        if (/^[a-z]+:\/\//i.test(raw)) return raw;
        if (/^localhost(:\d+)?/i.test(raw)) return "http://" + raw;
        if (/^[^\s]+\.[^\s]{2,}(\/.*)?$/.test(raw) && !raw.includes(" ")) {
          return "https://" + raw;
        }
        return "https://www.google.com/search?q=" + encodeURIComponent(raw);
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (chatModeUi || document.body.classList.contains("chat-mode")) {
          submitChatMessage();
          return;
        }
        const url = toURL(q.value);
        if (url) window.location.href = url;
      });

      sizeQGhostMinWidth();
      qGhostLoop.syncVisibility();
      autosizeComposer();
      focusHomeSearchInput();
      if (chatModeUi) syncComposerUi(true);

      function applyFooterBuildInfo(info) {
        const build = document.getElementById("homeBuild");
        const ver = document.getElementById("homeVersion");
        const gh = document.getElementById("homeGithub");
        const footer = document.querySelector(".home-footer");
        if (!info) return;

        if (build && info.buildId) {
          build.textContent = info.buildId;
          footer?.classList.add("has-build");
        }
        if (ver && info.version) {
          ver.textContent = "v" + info.version;
        }
        if (gh && info.githubURL) {
          gh.href = info.githubURL;
        }
      }

      async function initFooterMeta() {
        const params = new URLSearchParams(location.search);
        const fromQuery = params.get("build");
        if (fromQuery) {
          applyFooterBuildInfo({
            buildId: fromQuery,
            version: params.get("v") || "0.1.4",
            githubURL:
              window.slopApp?.githubURL ||
              "https://github.com/Nicol/SlopBrowser",
          });
          return;
        }

        if (window.slopApp?.buildId) {
          applyFooterBuildInfo({
            buildId: window.slopApp.buildId,
            version: window.slopApp.version,
            githubURL: window.slopApp.githubURL,
          });
          return;
        }

        try {
          const res = await fetch("build-info.json", { cache: "no-store" });
          if (res.ok) {
            applyFooterBuildInfo(await res.json());
          }
        } catch (_) {}
      }

      initFooterMeta();
    </script>
  </body>
</html>
